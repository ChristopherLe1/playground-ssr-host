name: Deploy tractor-store to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'tractor-store/**'
      - '.github/workflows/deploy-tractor-store.yml'
  workflow_dispatch:

concurrency:
  group: deploy-tractor-store
  cancel-in-progress: true

env:
  BASE_PATH: /angular-examples

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: tractor-store
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: tractor-store/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Build all four apps
        run: |
          pnpm ng build host     --configuration=production --base-href=${BASE_PATH}/
          pnpm ng build explore  --configuration=production --base-href=${BASE_PATH}/explore/
          pnpm ng build decide   --configuration=production --base-href=${BASE_PATH}/decide/
          pnpm ng build checkout --configuration=production --base-href=${BASE_PATH}/checkout/

      - name: Assemble _site
        run: |
          rm -rf _site
          mkdir -p _site
          cp -r dist/host/browser/. _site/
          cp -r dist/explore/browser  _site/explore
          cp -r dist/decide/browser   _site/decide
          cp -r dist/checkout/browser _site/checkout
          cp -r public/cdn _site/cdn
          touch _site/.nojekyll

      - name: Rewrite localhost CDN URLs in static assets
        run: |
          # Replace the dev CDN host with the deployed base path in the
          # @font-face url(...) inlined into the critical CSS and the bundled
          # CSS files.
          find _site -maxdepth 2 -type f \( -name '*.html' -o -name '*.css' \) \
            -exec sed -i "s|http://localhost:3000|${BASE_PATH}|g" {} +
          cp _site/index.html _site/404.html

      - name: Rewrite env.config.json files
        run: |
          jq --arg b "${BASE_PATH}" '{
            manifest: {
              "@tractor-store/explore":  ($b + "/explore/remoteEntry.json"),
              "@tractor-store/decide":   ($b + "/decide/remoteEntry.json"),
              "@tractor-store/checkout": ($b + "/checkout/remoteEntry.json")
            },
            production: true,
            apiUrl: "",
            scope: $b,
            cdnUrl: $b
          }' _site/env.config.json > _site/env.config.json.tmp
          mv _site/env.config.json.tmp _site/env.config.json

          # Per-remote manifests: list which sibling remotes each app loads
          # when running standalone. Mirrors the dev-time entries in each
          # remote's public/env.config.json.
          declare -A remote_manifest=(
            [explore]='{"@tractor-store/checkout": "/checkout/remoteEntry.json"}'
            [decide]='{"@tractor-store/explore": "/explore/remoteEntry.json", "@tractor-store/checkout": "/checkout/remoteEntry.json"}'
            [checkout]='{"@tractor-store/explore": "/explore/remoteEntry.json"}'
          )
          for app in explore decide checkout; do
            jq --arg b "${BASE_PATH}" --arg s "${BASE_PATH}/$app" \
               --argjson m "${remote_manifest[$app]}" \
               '{ manifest: ($m | with_entries(.value = $b + .value)),
                  production: true, apiUrl: "", scope: $s, cdnUrl: $b }' \
               "_site/$app/env.config.json" > "_site/$app/env.config.json.tmp"
            mv "_site/$app/env.config.json.tmp" "_site/$app/env.config.json"
          done

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: tractor-store/_site
          publish_branch: gh-pages
          force_orphan: true
          commit_message: 'deploy tractor-store: ${{ github.sha }}'

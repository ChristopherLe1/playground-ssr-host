<!doctype html>
<html>
  <head>
    <title>Todos</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      html, body { margin: 0; padding: 0; min-height: 100%; }
      body {
        background: linear-gradient(180deg, #eef0fb 0%, #f5f6fb 40%);
        min-height: 100vh;
      }
    </style>

    <!-- 1. Define your micro frontends (remotes) -->
    <script type="application/json" id="mfe-manifest">
      {
        "@team/mfe1": "./remoteEntry.json"
      }
    </script>

    <!-- 2. Handle loaded modules -->
    <script>
      window.addEventListener(
        "mfe-loader-available",
        (e) => {
          // Load your remote modules, a remote can have multiple modules
          e.detail.loadRemoteModule("@team/mfe1", "./Bootstrap");
        },
        { once: true },
      );
    </script>

    <!-- 3. Include the orchestrator runtime -->
    <script src="https://unpkg.com/@softarc/native-federation-orchestrator@4.0.0/quickstart.mjs"></script>
  </head>
  <body>
    <!-- 4. Use your loaded components -->
    <my-react-app></my-react-app>
  </body>
</html>
